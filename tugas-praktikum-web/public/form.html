<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Input - Scraping App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">ScrapingApp</a>
            <div class="navbar-nav">
                <a class="nav-link" href="index.html">Beranda</a>
                <a class="nav-link active" href="form.html">Tambah Target</a>
                <a class="nav-link" href="tabel.html">Data Target</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <h2>Form Tambah Target Scraping</h2>
        <div class="card mt-3">
            <div class="card-body">
                <form id="formTambah">
                    <div class="mb-3">
                        <label for="platform" class="form-label">Platform</label>
                        <select class="form-select" id="platform" name="platform" required>
                            <option value="">Pilih Platform...</option>
                            <option value="X (Twitter)">X (Twitter)</option>
                            <option value="Google Maps">Google Maps</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="keyword" class="form-label">Kata Kunci / Topik</label>
                        <input type="text" class="form-control" id="keyword" name="keyword"
                            placeholder="Contoh: Sentimen AI" required>
                    </div>
                    <div class="mb-3">
                        <label for="target_jumlah" class="form-label">Target Jumlah Data</label>
                        <input type="number" class="form-control" id="target_jumlah" name="target_jumlah" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Simpan Data</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        $(document).ready(function () {
            $('#formTambah').on('submit', function (e) {
                e.preventDefault();

                let formData = {
                    platform: $('#platform').val(),
                    keyword: $('#keyword').val(),
                    target_jumlah: $('#target_jumlah').val()
                };

                $.ajax({
                    url: '/api/datasets',
                    type: 'POST',
                    data: formData,
                    success: function (response) {
                        alert(response.message);
                        window.location.href = 'tabel.html'; // Otomatis pindah ke tabel setelah sukses
                    },
                    error: function () {
                        alert('Terjadi kesalahan!');
                    }
                });
            });
        });
    </script>
</body>

</html>
